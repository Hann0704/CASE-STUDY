<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Bliss - Contact & Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">Travel Bliss</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="destinations.html">Destinations</a></li>
        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

    <!-- 4. Contact Page Content -->
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
              <h2 class="text-center mb-4 mb-4 display-3 fw-bold gold-title">booking trip</h2>
                    </div>
                        <form id="bookingForm">
                            <!-- Name Field -->
                            <div class="mb-3">
                                <label for="name" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="name" placeholder="Enter your name" required>
                            </div>

                            <!-- Email Field -->
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                            </div>

                            <!-- Destination Dropdown -->
                            <div class="mb-3">
                                <label for="destination" class="form-label">Select Destination</label>
                                <select class="form-select" id="destination" required>
                                    <option value="" selected disabled>Choose a package...</option>
                                    <option value="Paris">Fairbanks, Alaska (RM 2,200)</option>
                                    <option value="Tokyo">Seoul, Korea (RM 1,500)</option>
                                    <option value="Bali">Bali, Indonesia (RM 900)</option>
                                </select>
                            </div>

                            <!-- Travel Date -->
                            <div class="mb-3">
                                <label for="date" class="form-label">Travel Date</label>
                                <input type="date" class="form-control" id="date" required>
                            </div>

                            <!-- Submit Button -->
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">Submit Booking</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 4. Bootstrap Modal (Confirmation Popup) -->
    <div class="modal fade" id="confirmationModal" tabindex="-1" aria-labelledby="confirmationModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title" id="confirmationModalLabel">Booking Confirmed</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Thank you for booking with Travel Bliss! We will contact you soon.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3">
        <div class="container">
            <p class="mb-0">&copy; 2026 Travel Bliss Agency. All rights reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- JavaScript to trigger Modal -->
    <script>
        // Listen for the form submit event
        document.getElementById('bookingForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent actual form submission for demo
            
            // Show the Bootstrap Modal
            var myModal = new bootstrap.Modal(document.getElementById('confirmationModal'));
            myModal.show();
            
            // Optional: Reset form after submission
            // this.reset();
        });
    </script>
